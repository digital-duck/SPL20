<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      color: #222;
    }

    /* ── Card ─────────────────────────────────────────────── */
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
      width: 100%;
      max-width: 560px;
      height: fit-content;
      overflow: hidden;
    }

    /* ── Header ───────────────────────────────────────────── */
    header {
      background: #4f46e5;
      color: #fff;
      padding: 24px 28px;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; }
    header p  { font-size: .85rem; opacity: .8; margin-top: 4px; }

    /* ── Add form ─────────────────────────────────────────── */
    .add-form {
      display: flex;
      gap: 8px;
      padding: 20px 28px;
      border-bottom: 1px solid #f0f0f0;
    }
    .add-form input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: .95rem;
      outline: none;
      transition: border-color .2s;
    }
    .add-form input:focus { border-color: #4f46e5; }
    .add-form button {
      padding: 10px 18px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .add-form button:hover { background: #4338ca; }

    /* ── Filters ──────────────────────────────────────────── */
    .filters {
      display: flex;
      gap: 4px;
      padding: 12px 28px;
      border-bottom: 1px solid #f0f0f0;
    }
    .filters button {
      padding: 5px 14px;
      border: 1.5px solid transparent;
      border-radius: 20px;
      font-size: .85rem;
      cursor: pointer;
      background: none;
      color: #6b7280;
      transition: all .15s;
    }
    .filters button.active { border-color: #4f46e5; color: #4f46e5; font-weight: 600; }
    .filters button:hover:not(.active) { background: #f3f4f6; }

    /* ── Todo list ────────────────────────────────────────── */
    .todo-list { padding: 8px 0; min-height: 60px; }
    .empty { text-align: center; padding: 32px; color: #9ca3af; font-size: .9rem; }

    /* ── Todo item ────────────────────────────────────────── */
    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 28px;
      border-bottom: 1px solid #f9f9f9;
      transition: background .15s;
    }
    .todo-item:hover { background: #fafafa; }
    .todo-item:last-child { border-bottom: none; }

    .todo-item input[type="checkbox"] {
      width: 18px; height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* ── Priority badge ───────────────────────────────────── */
    .badge {
      font-size: .7rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: .03em;
      flex-shrink: 0;
    }
    .badge-high   { background: #fef2f2; color: #ef4444; }
    .badge-medium { background: #fffbeb; color: #d97706; }
    .badge-low    { background: #f0fdf4; color: #16a34a; }

    .todo-title {
      flex: 1;
      font-size: .95rem;
      line-height: 1.4;
    }
    .todo-title.done { text-decoration: line-through; color: #9ca3af; }

    .todo-meta { font-size: .75rem; color: #b0b7c3; white-space: nowrap; }

    .btn-edit {
      background: none; border: none; cursor: pointer; color: #d1d5db;
      padding: 4px 6px; border-radius: 6px;
      transition: color .15s, background .15s;
      display: flex; align-items: center;
    }
    .btn-edit:hover { color: #4f46e5; background: #eef2ff; }

    .btn-delete {
      background: none; border: none; cursor: pointer; color: #d1d5db;
      font-size: 1.1rem; padding: 2px 6px; border-radius: 6px;
      transition: color .15s, background .15s; line-height: 1;
    }
    .btn-delete:hover { color: #ef4444; background: #fef2f2; }

    /* ── Footer ───────────────────────────────────────────── */
    footer {
      padding: 12px 28px; font-size: .8rem; color: #9ca3af;
      border-top: 1px solid #f0f0f0;
      display: flex; justify-content: space-between;
    }

    /* ── Modal overlay ────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 14px;
      padding: 28px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      animation: pop .15s ease;
    }
    @keyframes pop { from { transform: scale(.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .modal h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; color: #111; }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: .85rem; font-weight: 600; color: #374151; margin-bottom: 6px; }
    .field input[type="text"] {
      width: 100%; padding: 10px 12px;
      border: 1.5px solid #d1d5db; border-radius: 8px;
      font-size: .95rem; outline: none; transition: border-color .2s;
    }
    .field input[type="text"]:focus { border-color: #4f46e5; }

    /* Priority radio buttons */
    .priority-group { display: flex; gap: 8px; }
    .priority-group label {
      flex: 1; text-align: center; padding: 8px 4px;
      border: 1.5px solid #e5e7eb; border-radius: 8px;
      cursor: pointer; font-size: .85rem; font-weight: 600;
      transition: all .15s; user-select: none;
    }
    .priority-group input[type="radio"] { display: none; }
    .priority-group input[type="radio"]:checked + label.high   { border-color: #ef4444; background: #fef2f2; color: #ef4444; }
    .priority-group input[type="radio"]:checked + label.medium { border-color: #d97706; background: #fffbeb; color: #d97706; }
    .priority-group input[type="radio"]:checked + label.low    { border-color: #16a34a; background: #f0fdf4; color: #16a34a; }
    .priority-group label:hover { background: #f9fafb; }

    .modal-actions { display: flex; gap: 8px; margin-top: 24px; justify-content: flex-end; }
    .btn-cancel {
      padding: 9px 18px; background: #f3f4f6; border: none;
      border-radius: 8px; font-size: .9rem; cursor: pointer; color: #374151;
    }
    .btn-cancel:hover { background: #e5e7eb; }
    .btn-save {
      padding: 9px 20px; background: #4f46e5; color: #fff; border: none;
      border-radius: 8px; font-size: .9rem; font-weight: 600; cursor: pointer;
    }
    .btn-save:hover { background: #4338ca; }

    /* ── Toast ────────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: #ef4444; color: #fff;
      padding: 10px 20px; border-radius: 8px; font-size: .9rem;
      display: none; z-index: 999;
    }
    .toast.show { display: block; }
  </style>
</head>
<body>

<div class="card">
  <header>
    <h1>📝 Todo App</h1>
    <p>Powered by FastAPI · <a href="http://localhost:8000/docs" target="_blank" style="color:#c7d2fe">API docs ↗</a></p>
  </header>

  <form class="add-form" id="addForm">
    <input id="newTitle" type="text" placeholder="What needs to be done?" autocomplete="off" />
    <button type="submit">Add</button>
  </form>

  <div class="filters">
    <button data-filter="false">Active</button>
    <button data-filter="true">Completed</button>
    <button class="active" data-filter="all">All</button>
  </div>

  <div class="todo-list" id="todoList"></div>

  <footer>
    <span id="footerCount">0 items</span>
    <span id="footerDone"></span>
  </footer>
</div>

<!-- ── Edit modal ─────────────────────────────────────────── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>Edit Task</h2>

    <div class="field">
      <label for="modalTitle">Title</label>
      <input id="modalTitle" type="text" autocomplete="off" />
    </div>

    <div class="field">
      <label>Priority</label>
      <div class="priority-group">
        <input type="radio" name="priority" id="p-high"   value="high" />
        <label for="p-high"   class="high">🔴 High</label>

        <input type="radio" name="priority" id="p-medium" value="medium" checked />
        <label for="p-medium" class="medium">🟡 Medium</label>

        <input type="radio" name="priority" id="p-low"    value="low" />
        <label for="p-low"    class="low">🟢 Low</label>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" id="modalCancel">Cancel</button>
      <button class="btn-save"   id="modalSave">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = 'http://localhost:8000';
  let currentFilter = 'all';
  let todos = [];
  let editingId = null;   // id of the todo currently being edited

  // ── API helpers ──────────────────────────────────────────

  async function apiFetch(path, options = {}) {
    const res = await fetch(API + path, {
      headers: { 'Content-Type': 'application/json' },
      ...options,
    });
    if (res.status === 204) return null;
    if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
    return res.json();
  }

  const getTodos   = (completed) =>
    apiFetch('/todos' + (completed !== 'all' ? `?completed=${completed}` : ''));
  const createTodo = (title) =>
    apiFetch('/todos', { method: 'POST', body: JSON.stringify({ title }) });
  const toggleTodo = (id, completed) =>
    apiFetch(`/todos/${id}`, { method: 'PATCH', body: JSON.stringify({ completed }) });
  const updateTodo = (id, patch) =>
    apiFetch(`/todos/${id}`, { method: 'PATCH', body: JSON.stringify(patch) });
  const deleteTodo = (id) =>
    apiFetch(`/todos/${id}`, { method: 'DELETE' });

  // ── Render ───────────────────────────────────────────────

  const PRIORITY_BADGE = {
    high:   '<span class="badge badge-high">High</span>',
    medium: '<span class="badge badge-medium">Medium</span>',
    low:    '<span class="badge badge-low">Low</span>',
  };

  function formatDate(iso) {
    const d = new Date(iso + 'Z');
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function render() {
    const list  = document.getElementById('todoList');
    const count = document.getElementById('footerCount');
    const done  = document.getElementById('footerDone');

    if (todos.length === 0) {
      list.innerHTML = '<p class="empty">No todos here — add one above!</p>';
      count.textContent = '0 items';
      done.textContent  = '';
      return;
    }

    list.innerHTML = todos.map(t => `
      <div class="todo-item" data-id="${t.id}">
        <input type="checkbox" ${t.completed ? 'checked' : ''}
               onchange="handleToggle(${t.id}, this.checked)" />
        ${PRIORITY_BADGE[t.priority] ?? PRIORITY_BADGE.medium}
        <span class="todo-title ${t.completed ? 'done' : ''}">${escHtml(t.title)}</span>
        <span class="todo-meta">${formatDate(t.created_at)}</span>
        <button class="btn-edit" onclick="openModal(${t.id})" title="Edit">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
        <button class="btn-delete" onclick="handleDelete(${t.id})" title="Delete">✕</button>
      </div>
    `).join('');

    const doneCount = todos.filter(t => t.completed).length;
    count.textContent = `${todos.length} item${todos.length !== 1 ? 's' : ''}`;
    done.textContent  = doneCount ? `${doneCount} completed` : '';
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Load ─────────────────────────────────────────────────

  async function loadTodos() {
    try {
      todos = await getTodos(currentFilter);
      render();
    } catch (e) {
      showToast('Could not load todos: ' + e.message);
    }
  }

  // ── Handlers ─────────────────────────────────────────────

  document.getElementById('addForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const input = document.getElementById('newTitle');
    const title = input.value.trim();
    if (!title) return;
    try {
      await createTodo(title);
      input.value = '';
      await loadTodos();
    } catch (e) {
      showToast('Could not create todo: ' + e.message);
    }
  });

  async function handleToggle(id, completed) {
    try {
      await toggleTodo(id, completed);
      await loadTodos();
    } catch (e) {
      showToast('Could not update todo: ' + e.message);
      await loadTodos();
    }
  }

  async function handleDelete(id) {
    try {
      await deleteTodo(id);
      await loadTodos();
    } catch (e) {
      showToast('Could not delete todo: ' + e.message);
    }
  }

  document.querySelectorAll('.filters button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      loadTodos();
    });
  });

  // ── Modal ─────────────────────────────────────────────────

  function openModal(id) {
    const todo = todos.find(t => t.id === id);
    if (!todo) return;
    editingId = id;
    document.getElementById('modalTitle').value = todo.title;
    document.querySelector(`input[name="priority"][value="${todo.priority ?? 'medium'}"]`).checked = true;
    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('modalTitle').focus();
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    editingId = null;
  }

  document.getElementById('modalCancel').addEventListener('click', closeModal);

  document.getElementById('modalSave').addEventListener('click', async () => {
    const title    = document.getElementById('modalTitle').value.trim();
    const priority = document.querySelector('input[name="priority"]:checked').value;
    if (!title) return;
    try {
      await updateTodo(editingId, { title, priority });
      closeModal();
      await loadTodos();
    } catch (e) {
      showToast('Could not save: ' + e.message);
    }
  });

  // Close on overlay click or Escape key
  document.getElementById('modalOverlay').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeModal();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });
  // Save on Enter inside the title input
  document.getElementById('modalTitle').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('modalSave').click();
  });

  // ── Toast ─────────────────────────────────────────────────

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  // ── Init ──────────────────────────────────────────────────
  loadTodos();
</script>
</body>
</html>
